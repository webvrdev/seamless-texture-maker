<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Seamless Texture Maker — Edge Mirror Blend</title>
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<meta name="description" content="Seamless Texture Maker (Beta) — client-side tool to create tileable textures by mirroring and blending edges.">
<meta property="og:title" content="Seamless Texture Maker (Beta)">
<meta property="og:description" content="Create tileable textures in your browser (no uploads).">
<meta property="og:image" content="assets/banner.png">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">

<style>
  :root{ color-scheme: dark; }
  html,body{ height:100%; }
  body{
    margin:0;
    overflow:hidden;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
    background:#0b0f14;
    color:#e6edf3;
  }

  /* Stage (full screen) */
  #stage{
    position:fixed;
    inset:0;
    background-color:#0b0f14;
    background-repeat: repeat;
    background-position: 0px 0px;
    background-size: 256px 256px;
    cursor: grab;
    user-select:none;
  }
  #stage.dragging{ cursor: grabbing; }

  /* Title top-left */
  #title{
    position:fixed;
    top:10px;
    left:10px;
    font-weight:600;
    font-size:18px;
    letter-spacing:0.2px;
    text-shadow: 0 8px 26px rgba(0,0,0,0.45);
    z-index:50;
    pointer-events:none;
  }

  /* Footer */
  #footer{
    position:fixed;
    left:10px;
    bottom:10px;
    font-size:12px;
    color: rgba(220,230,242,0.70);
    text-shadow: 0 8px 26px rgba(0,0,0,0.45);
    z-index:50;
    pointer-events:none;
  }

  /* Floating UI panel (wider, shorter) */
  #panel{
    position:fixed;
    left:50%;
    bottom:22px;
    transform: translateX(-50%);
    width:min(920px, calc(100vw - 26px));
    background: rgba(10,14,20,0.72);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 22px;
    backdrop-filter: blur(16px);
    box-shadow: 0 18px 50px rgba(0,0,0,0.45);
    z-index:60;
    overflow:hidden;
    touch-action:none;
  }

  #panelHeader{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    cursor: grab;
  }
  #panelHeader:active{ cursor: grabbing; }

  #statusPill{
    font-size:12px;
    color:#b6c2d0;
    border:1px solid rgba(255,255,255,0.14);
    border-radius:999px;
    padding:4px 10px;
    white-space:nowrap;
  }

  .iconBtn{
    width:40px;height:40px;
    border-radius:14px;
    background: rgba(11,18,32,0.80);
    border: 1px solid rgba(255,255,255,0.12);
    color:#e6edf3;
    display:grid;
    place-items:center;
    cursor:pointer;
    user-select:none;
  }
  .iconBtn:active{ transform: scale(0.98); }
  .icon{ width:18px;height:18px; display:block; }

  #panelBody{ padding:10px 12px 12px; }

  label{
    display:block;
    font-size:11px;
    color:#b6c2d0;
    margin: 6px 0 6px;
  }

  /* Unified control styling */
  select, input[type="number"], button, .fakeInput{
    height:40px;
    box-sizing:border-box;
    background: rgba(11,18,32,0.85);
    color:#e6edf3;
    border:1px solid rgba(255,255,255,0.14);
    border-radius: 14px;
    padding:10px 12px;
    outline:none;
    font-size:13px;
  }
  button{ cursor:pointer; }
  button.primary{ border-color: rgba(43,138,110,0.9); }
  button:disabled, select:disabled{ opacity:.5; cursor:not-allowed; }

  input[type="range"]{ width:100%; }

  /* Top row layout: aligned */
  .topGrid{
    display:grid;
    grid-template-columns: 2.2fr 1.2fr 1fr auto;
    gap:12px;
    align-items:end;
  }
  @media (max-width: 820px){
    .topGrid{ grid-template-columns: 1fr 1fr; }
  }

  .uploadRow{
    display:flex;
    gap:10px;
    align-items:center;
  }
  .fileBtn{ white-space:nowrap; }
  .fileName{
    flex:1 1 auto;
    min-width: 0;
    overflow:hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    opacity:0.9;
  }

  /* Controls grid: two columns, compact */
  .twoCol{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:14px;
    margin-top:10px;
  }
  @media (max-width: 820px){
    .twoCol{ grid-template-columns: 1fr; }
  }

  .section{
    background: rgba(11,18,32,0.35);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 18px;
    padding:10px 12px 12px;
  }

  .toggleRow{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:8px;
  }
  .toggleRow input{ width:auto; transform: translateY(1px); }

  .subGrid{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:12px;
  }

  /* Collapsed: only gear button */
  #panel.collapsed{
    width:64px;
    height:64px;
    border-radius: 22px;
    overflow:visible;
  }
  #panel.collapsed #panelHeader,
  #panel.collapsed #panelBody{ display:none; }

  #gearOnly{
    display:none;
    position:absolute;
    inset:0;
    border-radius:22px;
    background: rgba(10,14,20,0.78);
    border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(16px);
    box-shadow: 0 18px 50px rgba(0,0,0,0.45);
    cursor: grab;
    touch-action:none;
  }
  #gearOnly:active{ cursor: grabbing; }
  #panel.collapsed #gearOnly{ display:grid; place-items:center; }
  #gearOnly .icon{ width:22px; height:22px; opacity:0.95; }

  /* Utility */
  .no-drag{ touch-action:auto; }
</style>
</head>
<body>

<div id="stage" aria-label="Preview stage"></div>
<div id="title">Seamless Texture Maker</div>
<div id="footer">webvrdev.com · © 2026</div>

<div id="panel">
  <div id="gearOnly" class="no-drag" title="Open">
    <svg class="icon" viewBox="0 0 24 24" fill="none">
      <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" stroke="currentColor" stroke-width="2"/>
      <path d="M19.4 15a8 8 0 0 0 .1-1l2-1.2-2-3.5-2.3.5a7.6 7.6 0 0 0-.8-.5l-.3-2.3H10l-.3 2.3-.8.5-2.3-.5-2 3.5 2 1.2a8 8 0 0 0 .1 1 8 8 0 0 0-.1 1l-2 1.2 2 3.5 2.3-.5c.26.18.53.35.8.5l.3 2.3h4.2l.3-2.3c.27-.15.54-.32.8-.5l2.3.5 2-3.5-2-1.2a8 8 0 0 0 .1-1Z"
        stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
    </svg>
  </div>

  <div id="panelHeader">
    <div class="left">
      <span id="statusPill">No image</span>
    </div>
    <div class="right">
      <button id="minBtn" class="iconBtn no-drag" type="button" title="Collapse">
        <svg class="icon" viewBox="0 0 24 24" fill="none">
          <path d="M6 12h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="panelBody">
    <div class="topGrid">
      <div>
        <label>Upload texture</label>
        <div class="uploadRow">
          <input id="file" type="file" accept="image/*" style="display:none"/>
          <button id="chooseBtn" class="fileBtn no-drag" type="button">Choose file</button>
          <div id="fileName" class="fakeInput fileName">No file selected</div>
        </div>
      </div>

      <div>
        <label>Output size</label>
        <select id="sizeSel" class="no-drag" disabled>
          <option value="source" selected>Source (fit square)</option>
          <option value="512">512</option>
          <option value="1024">1024</option>
          <option value="2048">2048</option>
          <option value="4096">4096</option>
        </select>
      </div>

      <div>
        <label>Format</label>
        <select id="fmtSel" class="no-drag" disabled>
          <option value="image/png" selected>PNG</option>
          <option value="image/webp">WebP</option>
          <option value="image/jpeg">JPG</option>
        </select>
      </div>

      <div>
        <label>Actions</label>
        <div style="display:flex; gap:10px; justify-content:flex-end;">
          <button id="resetBtn" class="no-drag" type="button" disabled>Reset</button>
          <button id="exportBtn" class="primary no-drag" type="button" disabled>Export</button>
        </div>
      </div>
    </div>

    <div class="twoCol">
      <div class="section">
        <div class="toggleRow">
          <input id="hOn" class="no-drag" type="checkbox" disabled checked>
          <div style="font-size:12px;color:#cbd6e2;">Horizontal tiling (Left → Right)</div>
        </div>

        <label>Strip width</label>
        <input id="hWidth" class="no-drag" type="range" min="4" max="512" value="60" disabled>

        <div class="subGrid">
          <div>
            <label>Feather</label>
            <input id="hCurve" class="no-drag" type="range" min="0" max="100" value="45" disabled>
          </div>
          <div>
            <label>Opacity</label>
            <input id="hOpacity" class="no-drag" type="range" min="0" max="100" value="100" disabled>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="toggleRow">
          <input id="vOn" class="no-drag" type="checkbox" disabled checked>
          <div style="font-size:12px;color:#cbd6e2;">Vertical tiling (Top → Bottom)</div>
        </div>

        <label>Strip height</label>
        <input id="vHeight" class="no-drag" type="range" min="4" max="512" value="60" disabled>

        <div class="subGrid">
          <div>
            <label>Feather</label>
            <input id="vCurve" class="no-drag" type="range" min="0" max="100" value="45" disabled>
          </div>
          <div>
            <label>Opacity</label>
            <input id="vOpacity" class="no-drag" type="range" min="0" max="100" value="100" disabled>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<canvas id="base" width="1024" height="1024" style="display:none;"></canvas>
<canvas id="out" width="1024" height="1024" style="display:none;"></canvas>
<canvas id="tmp" width="1024" height="1024" style="display:none;"></canvas>

<script>
(() => {
  const el=id=>document.getElementById(id);
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

  const stage = el('stage');

  // Panel
  const panel = el('panel');
  const panelHeader = el('panelHeader');
  const gearOnly = el('gearOnly');
  const minBtn = el('minBtn');
  const statusPill = el('statusPill');

  // Custom file UI
  const file = el('file');
  const chooseBtn = el('chooseBtn');
  const fileNameEl = el('fileName');

  // Controls
  const sizeSel=el('sizeSel'), fmtSel=el('fmtSel');
  const resetBtn=el('resetBtn'), exportBtn=el('exportBtn');
  const hOn=el('hOn'), hWidth=el('hWidth'), hCurve=el('hCurve'), hOpacity=el('hOpacity');
  const vOn=el('vOn'), vHeight=el('vHeight'), vCurve=el('vCurve'), vOpacity=el('vOpacity');

  // Canvases
  const base=el('base'), out=el('out'), tmp=el('tmp');
  const bctx=base.getContext('2d',{willReadFrequently:true});
  const octx=out.getContext('2d',{willReadFrequently:true});
  const tctx=tmp.getContext('2d',{willReadFrequently:true});

  // State
  let originalBitmap=null, originalW=0, originalH=0, size=1024;
  const view={ texURL:null, tilePx:256, zoom:1.0, panX:0, panY:0, dragging:false, lastX:0, lastY:0 };
  let regenTimer=null, busy=false;

  function setEnabled(on){
    resetBtn.disabled=!on;
    exportBtn.disabled=!on;
    sizeSel.disabled=!on;
    fmtSel.disabled=!on;
    hOn.disabled=!on; hWidth.disabled=!on; hCurve.disabled=!on; hOpacity.disabled=!on;
    vOn.disabled=!on; vHeight.disabled=!on; vCurve.disabled=!on; vOpacity.disabled=!on;
  }

  function setStatus(text){ statusPill.textContent = text; }

  function setSize(){
    const v=sizeSel.value;
    if(v==='source') size=Math.min(4096, Math.max(512, Math.max(originalW, originalH)));
    else size=parseInt(v,10);
    size=clamp(size,256,4096);
    base.width=base.height=size;
    out.width=out.height=size;
    tmp.width=tmp.height=size;
  }

  function drawOriginalToBase(){
    const w=originalW,h=originalH,s=Math.min(w,h);
    const sx=((w-s)/2)|0, sy=((h-s)/2)|0;
    bctx.clearRect(0,0,size,size);
    bctx.drawImage(originalBitmap, sx, sy, s, s, 0, 0, size, size);
  }

  function makeGammaGradient(ctx, x0,y0,x1,y1, gamma){
    const g = ctx.createLinearGradient(x0,y0,x1,y1);
    const stops = 16;
    for(let i=0;i<=stops;i++){
      const t = i / stops;
      const a = Math.pow(t, gamma);
      g.addColorStop(t, `rgba(255,255,255,${a})`);
    }
    return g;
  }

  function applyHorizontalEdgeBlend(srcCanvas, dstCtx){
    const W=size, H=size;
    if(!hOn.checked) return;

    let sw=parseInt(hWidth.value,10);
    sw=clamp(sw, 2, Math.min(512, Math.floor(W/2)));

    const opacity=parseInt(hOpacity.value,10)/100;
    const curve=parseInt(hCurve.value,10)/100;
    const gamma=0.55 + (3.0-0.55)*curve;

    tmp.width=sw;
    tmp.height=H;

    tctx.setTransform(1,0,0,1,0,0);
    tctx.clearRect(0,0,sw,H);

    tctx.save();
    tctx.translate(sw,0);
    tctx.scale(-1,1);
    tctx.drawImage(srcCanvas, 0,0, sw,H, 0,0, sw,H);
    tctx.restore();

    tctx.save();
    tctx.globalCompositeOperation='destination-in';
    tctx.fillStyle=makeGammaGradient(tctx, 0,0, sw,0, gamma);
    tctx.fillRect(0,0,sw,H);
    tctx.restore();

    dstCtx.save();
    dstCtx.globalAlpha=opacity;
    dstCtx.drawImage(tmp, W-sw, 0);
    dstCtx.restore();
  }

  function applyVerticalEdgeBlend(srcCanvas, dstCtx){
    const W=size, H=size;
    if(!vOn.checked) return;

    let sh=parseInt(vHeight.value,10);
    sh=clamp(sh, 2, Math.min(512, Math.floor(H/2)));

    const opacity=parseInt(vOpacity.value,10)/100;
    const curve=parseInt(vCurve.value,10)/100;
    const gamma=0.55 + (3.0-0.55)*curve;

    tmp.width=W;
    tmp.height=sh;

    tctx.setTransform(1,0,0,1,0,0);
    tctx.clearRect(0,0,W,sh);

    tctx.save();
    tctx.translate(0, sh);
    tctx.scale(1,-1);
    tctx.drawImage(srcCanvas, 0,0, W,sh, 0,0, W,sh);
    tctx.restore();

    tctx.save();
    tctx.globalCompositeOperation='destination-in';
    tctx.fillStyle=makeGammaGradient(tctx, 0,0, 0,sh, gamma);
    tctx.fillRect(0,0,W,sh);
    tctx.restore();

    dstCtx.save();
    dstCtx.globalAlpha=opacity;
    dstCtx.drawImage(tmp, 0, H-sh);
    dstCtx.restore();
  }

  function refreshStage(){
    view.texURL = out.toDataURL('image/png');
    const eff = Math.max(4, Math.round(view.tilePx * view.zoom));
    stage.style.backgroundImage = `url("${view.texURL}")`;
    stage.style.backgroundSize = `${eff}px ${eff}px`;
    stage.style.backgroundPosition = `${view.panX}px ${view.panY}px`;
  }

  function regenerate(){
    if(!originalBitmap || busy) return;
    busy=true;

    octx.setTransform(1,0,0,1,0,0);
    octx.clearRect(0,0,size,size);
    octx.drawImage(base,0,0);

    applyHorizontalEdgeBlend(base, octx);
    applyVerticalEdgeBlend(out, octx);

    refreshStage();
    busy=false;
  }

  function scheduleRegen(){
    if(!originalBitmap) return;
    if(regenTimer) clearTimeout(regenTimer);
    regenTimer=setTimeout(()=>{ regenTimer=null; regenerate(); }, 70);
  }

  // Stage controls
  stage.addEventListener('pointerdown', (e)=>{
    if(!view.texURL) return;
    view.dragging=true;
    stage.classList.add('dragging');
    view.lastX=e.clientX; view.lastY=e.clientY;
    stage.setPointerCapture(e.pointerId);
  });
  stage.addEventListener('pointermove', (e)=>{
    if(!view.dragging) return;
    const dx=e.clientX-view.lastX, dy=e.clientY-view.lastY;
    view.lastX=e.clientX; view.lastY=e.clientY;
    view.panX += dx;
    view.panY += dy;
    refreshStage();
  });
  stage.addEventListener('pointerup', (e)=>{
    view.dragging=false;
    stage.classList.remove('dragging');
    try{ stage.releasePointerCapture(e.pointerId); }catch{}
  });
  stage.addEventListener('wheel', (e)=>{
    if(!view.texURL) return;
    e.preventDefault();
    const dir = Math.sign(e.deltaY);
    if(e.shiftKey){
      view.tilePx = clamp(view.tilePx + (dir>0 ? -24 : 24), 16, 2048);
    } else {
      view.zoom = clamp(view.zoom + (dir>0 ? -0.08 : 0.08), 0.1, 4.0);
    }
    refreshStage();
  }, {passive:false});
  stage.addEventListener('dblclick', ()=>{
    view.panX=0; view.panY=0; view.zoom=1.0; view.tilePx=256;
    refreshStage();
  });

  // Collapse toggle (fixed)
  function setCollapsed(on){ panel.classList.toggle('collapsed', on); }
  minBtn.addEventListener('click', (e)=>{ e.stopPropagation(); setCollapsed(true); });
  gearOnly.addEventListener('click', (e)=>{ e.stopPropagation(); setCollapsed(false); });

  // Draggable panel (ignore controls)
  function makeDraggable(handleEl){
    let dragging=false, startX=0, startY=0, baseLeft=0, baseTop=0;

    const startDrag = (e)=>{
      if (e.target && e.target.closest('.no-drag')) return;
      dragging=true;
      handleEl.setPointerCapture(e.pointerId);
      startX=e.clientX; startY=e.clientY;

      const rect=panel.getBoundingClientRect();
      baseLeft = rect.left;
      baseTop  = rect.top;

      panel.style.transform = 'none';
      panel.style.left = baseLeft + 'px';
      panel.style.top  = baseTop + 'px';
      panel.style.bottom = 'auto';
    };

    const moveDrag = (e)=>{
      if(!dragging) return;
      const dx=e.clientX-startX, dy=e.clientY-startY;

      const rect=panel.getBoundingClientRect();
      const pw = rect.width;
      const ph = rect.height;

      let nx = baseLeft + dx;
      let ny = baseTop + dy;

      nx = clamp(nx, 8, window.innerWidth - pw - 8);
      ny = clamp(ny, 8, window.innerHeight - ph - 8);

      panel.style.left = nx + 'px';
      panel.style.top  = ny + 'px';
    };

    const endDrag = (e)=>{
      dragging=false;
      try{ handleEl.releasePointerCapture(e.pointerId); }catch{}
    };

    handleEl.addEventListener('pointerdown', startDrag);
    handleEl.addEventListener('pointermove', moveDrag);
    handleEl.addEventListener('pointerup', endDrag);
  }
  makeDraggable(panelHeader);

  // File picker (custom UI)
  chooseBtn.addEventListener('click', ()=> file.click());

  file.addEventListener('change', async ()=>{
    const f=file.files?.[0];
    if(!f) return;

    fileNameEl.textContent = f.name;
    setStatus('Loading…');

    const img=new Image();
    img.decoding='async';
    img.src=URL.createObjectURL(f);
    await img.decode();

    originalW=img.naturalWidth;
    originalH=img.naturalHeight;
    originalBitmap=await createImageBitmap(img);
    URL.revokeObjectURL(img.src);

    // Defaults
    hOn.checked=true; vOn.checked=true;
    hWidth.value=60; vHeight.value=60;
    hCurve.value=45; vCurve.value=45;
    hOpacity.value=100; vOpacity.value=100;

    view.tilePx=256; view.zoom=1.0; view.panX=0; view.panY=0;

    setSize();
    drawOriginalToBase();
    setEnabled(true);

    regenerate();
    setStatus(`Loaded ${size}×${size}`);
  });

  sizeSel.addEventListener('change', ()=>{
    if(!originalBitmap) return;
    setSize();
    drawOriginalToBase();
    scheduleRegen();
    setStatus(`Loaded ${size}×${size}`);
  });

  resetBtn.addEventListener('click', ()=>{
    if(!originalBitmap) return;
    drawOriginalToBase();
    scheduleRegen();
    setStatus('Reset');
  });

  exportBtn.addEventListener('click', ()=>{
    if(!originalBitmap) return;
    const mime=fmtSel.value;
    const quality=0.92;
    const url=out.toDataURL(mime, quality);
    const a=document.createElement('a');
    const ext=mime==='image/png'?'png':(mime==='image/webp'?'webp':'jpg');
    a.download=`seamless_edgeblend_${size}x${size}.${ext}`;
    a.href=url;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setStatus('Exported');
  });

  [hOn,hWidth,hCurve,hOpacity,vOn,vHeight,vCurve,vOpacity].forEach(x=>{
    x.addEventListener('input', scheduleRegen);
    x.addEventListener('change', scheduleRegen);
  });

  // Init
  setEnabled(false);
  setStatus('No image');
})();
</script>
</body>
</html>
